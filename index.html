<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receipt AI Pro - Production</title>
<style>
body{font-family:sans-serif;margin:0;background:#0f172a;color:#fff}
.container{max-width:520px;margin:auto;padding:12px}
h1{font-size:18px}
button{padding:10px;border:none;border-radius:8px;background:#2563eb;color:#fff;margin:5px;cursor:pointer}
video{width:100%;border-radius:12px}
.card{background:#1e293b;padding:10px;border-radius:12px;margin-top:10px}
.item{padding:8px;border-bottom:1px solid #334155;cursor:pointer}
.item:hover{background:#334155}
input{padding:6px;border-radius:6px;border:none;width:100%}
.flex{display:flex;gap:6px}
.small{font-size:12px;color:#94a3b8}
</style>
</head>
<body>

<div class="container">
<h1>🧾 Receipt AI Pro</h1>

<button onclick="startCamera()">📷 カメラ開始</button>
<button onclick="stopCamera()">停止</button>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none"></canvas>

<div class="card">
<h3>候補（タップで追加）</h3>
<div id="candidates"></div>
</div>

<div class="card">
<h3>明細</h3>
<div id="items"></div>
<div class="small">※タップで編集</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script>
let stream=null,running=false,items=[];

// ========= Camera =========
async function startCamera(){
 stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
 video.srcObject=stream;
 running=true;
 loop();
}
function stopCamera(){
 running=false;
 if(stream)stream.getTracks().forEach(t=>t.stop());
}

// ========= Loop =========
async function loop(){
 if(!running)return;
 capture();
 const text=await ocr();
 const lines=parse(text);
 renderCandidates(lines);
 setTimeout(loop,1200);
}

function capture(){
 const ctx=canvas.getContext('2d');
 canvas.width=video.videoWidth;
 canvas.height=video.videoHeight;
 ctx.drawImage(video,0,0);
}

// ========= OCR =========
async function ocr(){
 const res=await Tesseract.recognize(canvas,'jpn+eng',{logger:m=>{}});
 return res.data.text;
}

// ========= Parse =========
function parse(text){
 return text.split("\n")
  .map(l=>l.trim())
  .filter(l=>/\d{2,}/.test(l) && !/合計|税|TEL/.test(l))
  .slice(0,8);
}

// ========= Candidates =========
function renderCandidates(lines){
 candidates.innerHTML=lines.map(l=>
  `<div class="item" onclick="addItem('${l}')">${l}</div>`
 ).join('');
}

// ========= Items =========
function addItem(line){
 const parsed=parseLine(line);
 items.push(parsed);
 renderItems();
}

function parseLine(line){
 const m=line.match(/(.+?)\s*(\d+)/);
 if(m){
  return {name:m[1],price:parseInt(m[2]),qty:1};
 }
 return {name:line,price:0,qty:1};
}

function renderItems(){
 itemsDiv.innerHTML=items.map((i,idx)=>`
  <div class="item" onclick="editItem(${idx})">
    <div>${i.name}</div>
    <div class="small">¥${i.price} × ${i.qty}</div>
  </div>
 `).join('');
}

function editItem(i){
 const name=prompt("商品名",items[i].name);
 const price=prompt("価格",items[i].price);
 const qty=prompt("数量",items[i].qty);
 items[i]={name,price:parseInt(price),qty:parseInt(qty)};
 renderItems();
}
</script>

</body>
</html>
