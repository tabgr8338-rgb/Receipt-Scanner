<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Receipt AI Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 80px; }
        .container { max-width: 500px; margin: auto; padding: 16px; }
        .preview-box { position: relative; width: 100%; border-radius: 16px; overflow: hidden; background: #000; border: 2px solid #334155; aspect-ratio: 4/3; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .btn { padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin: 8px 0; }
        .btn-primary { background: var(--primary); color: white; }
        .card { background: var(--card); padding: 16px; border-radius: 12px; margin-top: 12px; border: 1px solid #334155; }
        #status-bar { font-size: 12px; color: #94a3b8; background: #000; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--accent); }
        .candidate-item { background: #334155; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid var(--accent); cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔍 Receipt AI Pro</h1>
    <div id="status-bar">初期化中...</div>

    <div class="preview-box">
        <video id="video" autoplay playsinline></video>
    </div>
    
    <button id="btn-toggle" class="btn btn-primary" onclick="toggleCamera()">📷 カメラ開始</button>

    <div class="card">
        <span style="font-size:11px; color:var(--accent); font-weight:bold;">読み取り結果</span>
        <div id="candidates" style="margin-top:10px;"></div>
    </div>
</div>

<canvas id="canvas" style="display:none"></canvas>

<script>
let worker = null, stream = null, isRunning = false;

// 1. OCRエンジン初期化（GitHub Pagesのセキュリティ制限を回避する設定）
async function initOCR() {
    try {
        setStatus("エンジン読み込み中...");
        
        // 【重要】外部スクリプトのブロックを避けるための設定
        worker = await Tesseract.createWorker({
            workerPath: 'https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/worker.min.js',
            corePath: 'https://cdn.jsdelivr.net/npm/tesseract.js-core@4.0.2/tesseract-core.wasm.js',
            logger: m => {
                if (m.status === 'recognizing text') setStatus(`解析中... ${Math.round(m.progress * 100)}%`);
            }
        });

        await worker.loadLanguage('jpn+eng');
        await worker.initialize('jpn+eng');
        
        setStatus("✅ 準備完了：カメラを開始してください");
    } catch (e) { 
        setStatus("❌ 初期化エラー。ブラウザを更新してください");
        console.error("詳細エラー:", e);
    }
}

// 起動と同時に初期化
initOCR();

async function toggleCamera() {
    if (isRunning) {
        isRunning = false;
        if (stream) stream.getTracks().forEach(t => t.stop());
        document.getElementById('btn-toggle').innerText = "📷 カメラ開始";
        setStatus("停止中");
    } else {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: { ideal: 1280 } } 
            });
            document.getElementById('video').srcObject = stream;
            isRunning = true;
            document.getElementById('btn-toggle').innerText = "⏹️ スキャン停止";
            ocrLoop();
        } catch (err) { 
            alert("カメラを起動できません。ブラウザの設定で許可してください。"); 
        }
    }
}

async function ocrLoop() {
    if (!isRunning || !worker) return;
    
    const v = document.getElementById('video');
    const c = document.getElementById('canvas');
    const ctx = c.getContext('2d');
    
    c.width = v.videoWidth; 
    c.height = v.videoHeight;
    
    // OCR用に画像を最適化
    ctx.filter = 'grayscale(1) contrast(200%) brightness(110%)';
    ctx.drawImage(v, 0, 0);

    try {
        // Canvasから直接データを送る
        const { data: { text } } = await worker.recognize(c);
        
        const lines = text.split("\n")
            .map(l => l.trim())
            .filter(l => l.length >= 1) // 1文字でもあれば出す
            .slice(0, 5);
        
        renderLines(lines);
    } catch (e) {
        console.error("OCRエラー:", e);
    }

    if (isRunning) setTimeout(ocrLoop, 1500); 
}

function renderLines(lines) {
    const container = document.getElementById('candidates');
    if (lines.length === 0) {
        container.innerHTML = '<div style="font-size:12px; opacity:0.5">文字を探しています...</div>';
        return;
    }
    container.innerHTML = lines.map(l => `<div class="candidate-item">${l}</div>`).join('');
}

function setStatus(m) { document.getElementById('status-bar').innerText = m; }
</script>
</body>
</html>
