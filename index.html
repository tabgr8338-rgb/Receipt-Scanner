<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Receipt AI Pro - Precision Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 30px; }
        .container { max-width: 500px; margin: auto; padding: 16px; }
        .preview-box { position: relative; width: 100%; border-radius: 16px; overflow: hidden; background: #000; border: 2px solid #334155; aspect-ratio: 3/4; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #canvas-preview { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; object-fit: cover; }
        .btn { padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin: 8px 0; font-size: 16px; }
        .btn-scan { background: var(--primary); color: white; }
        .btn-reset { background: #334155; color: white; }
        .card { background: var(--card); padding: 16px; border-radius: 12px; margin-top: 12px; border: 1px solid #334155; }
        #status-bar { font-size: 13px; color: var(--accent); background: #000; padding: 10px; border-radius: 8px; margin-bottom: 10px; text-align: center; border: 1px solid #334155; }
        .item-row { background: #334155; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid var(--accent); font-size: 15px; }
        .loader { display: none; border: 3px solid #f3f3f3; border-top: 3px solid var(--accent); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div id="status-bar">エンジン起動中...</div>

    <div class="preview-box">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas-preview"></canvas>
    </div>
    
    <button id="btn-main" class="btn btn-scan" onclick="processImage()" disabled>📷 レシートを撮影して解析</button>
    <button id="btn-retry" class="btn btn-reset" onclick="resetCamera()" style="display:none">🔄 撮り直す</button>

    <div class="card">
        <span style="font-size:12px; color:var(--accent); font-weight:bold;">解析された項目</span>
        <div id="results" style="margin-top:10px;"></div>
    </div>
</div>

<canvas id="hidden-canvas" style="display:none"></canvas>

<script>
let worker = null;
let stream = null;

async function init() {
    try {
        worker = await Tesseract.createWorker({
            workerPath: 'https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/worker.min.js',
            corePath: 'https://cdn.jsdelivr.net/npm/tesseract.js-core@4.0.2/tesseract-core.wasm.js',
        });
        await worker.loadLanguage('jpn+eng');
        await worker.initialize('jpn+eng');
        document.getElementById('status-bar').innerText = "✅ 準備完了：レシートを枠に入れてください";
        document.getElementById('btn-main').disabled = false;
        startCamera();
    } catch (e) {
        document.getElementById('status-bar').innerText = "❌ エラー: ブラウザ設定を確認してください";
    }
}

async function startCamera() {
    stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } 
    });
    document.getElementById('video').srcObject = stream;
}

async function processImage() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('hidden-canvas');
    const preview = document.getElementById('canvas-preview');
    const ctx = canvas.getContext('2d');

    // 1. 静止画をキャプチャ（最高画質）
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    
    // 前処理：コントラストを極限まで上げる
    ctx.filter = 'contrast(200%) grayscale(1)';
    ctx.drawImage(video, 0, 0);

    // 2. プレビュー画面を止める（写真のように見せる）
    preview.width = video.videoWidth;
    preview.getContext('2d').drawImage(canvas, 0, 0);
    preview.style.display = "block";
    video.style.display = "none";
    
    // 3. UIの切り替え
    document.getElementById('btn-main').style.display = "none";
    document.getElementById('btn-retry').style.display = "block";
    document.getElementById('status-bar').innerHTML = '<span class="loader"></span> じっくり解析中... 5〜10秒かかります';

    try {
        // 4. 解析実行（静止画なので精度が上がります）
        const { data: { text } } = await worker.recognize(canvas);
        
        // 5. 意味のある行だけを抽出（数字が含まれる行を優先）
        const lines = text.split("\n")
            .map(l => l.trim())
            .filter(l => l.length >= 2 && !/合計|税込|税率|TEL/.test(l));
        
        renderResults(lines);
        document.getElementById('status-bar').innerText = "✅ 解析完了";
    } catch (e) {
        document.getElementById('status-bar').innerText = "⚠️ 解析に失敗しました";
    }
}

function resetCamera() {
    document.getElementById('canvas-preview').style.display = "none";
    document.getElementById('video').style.display = "block";
    document.getElementById('btn-main').style.display = "block";
    document.getElementById('btn-retry').style.display = "none";
    document.getElementById('status-bar').innerText = "レシートにピントを合わせてください";
    document.getElementById('results').innerHTML = "";
}

function renderResults(lines) {
    const container = document.getElementById('results');
    if (lines.length === 0) {
        container.innerHTML = "文字が読み取れませんでした。もっと明るい場所で、近づけて撮ってください。";
        return;
    }
    container.innerHTML = lines.map(l => `<div class="item-row">${l}</div>`).join('');
}

init();
</script>
</body>
</html>
