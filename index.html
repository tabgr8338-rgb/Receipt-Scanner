<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receipt AI Pro</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
:root{
 --bg:#f3f4f6;
 --card:#ffffff;
 --text:#111;
 --sub:#666;
 --food:#34d399;
 --other:#818cf8;
}
body{font-family:-apple-system,BlinkMacSystemFont;background:var(--bg);margin:0}
.container{max-width:520px;margin:auto;padding:16px}
.card{background:var(--card);padding:14px;margin-bottom:12px;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,0.05)}
input,button,select{width:100%;margin-top:6px;padding:10px;border-radius:8px;border:1px solid #ddd}
button{background:#111;color:#fff;border:none}
.item{display:flex;gap:6px;margin-top:6px}
.item input{flex:1}
.badge{padding:4px 6px;border-radius:6px;font-size:12px}
.food{background:var(--food)}
.other{background:var(--other);color:#fff}
.summary{font-size:14px;line-height:1.6}
</style>
</head>
<body>
<div class="container">
<h2>Receipt AI Pro</h2>

<div class="card">
<input type="file" id="file" accept="image/*" multiple>
<button onclick="scan()">📷 スキャン</button>
<div id="status"></div>
</div>

<div class="card">
<label>店舗名</label>
<input id="store">
<label>日付</label>
<input type="date" id="date">
</div>

<div class="card">
<h3>明細</h3>
<div id="items"></div>
</div>

<div class="card">
<h3>集計</h3>
<select id="period" onchange="renderSummary()">
<option value="all">全期間</option>
<option value="month">今月</option>
</select>
<div id="summary" class="summary"></div>
</div>

<button onclick="save()">保存</button>
</div>

<script>
let db;
let items=[];

// DB
const req=indexedDB.open('receiptDB',1);
req.onupgradeneeded=e=>{
 const db=e.target.result;
 db.createObjectStore('receipts',{keyPath:'id',autoIncrement:true});
};
req.onsuccess=e=>{db=e.target.result;renderSummary();};

// 前処理
async function preprocess(file){
 return new Promise(res=>{
  const img=new Image();
  const reader=new FileReader();
  reader.onload=e=>img.src=e.target.result;
  img.onload=()=>{
    const canvas=document.createElement('canvas');
    const ctx=canvas.getContext('2d');
    const scale=900/img.width;
    canvas.width=900;
    canvas.height=img.height*scale;
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    res(canvas);
  };
  reader.readAsDataURL(file);
 });
}

// 店舗判定
function detectStore(text){
 if(/セブン|7-ELEVEN/i.test(text)) return 'seven';
 if(/イオン|AEON/i.test(text)) return 'aeon';
 if(/ファミマ|FamilyMart/i.test(text)) return 'family';
 return 'generic';
}

// パース
function parse(text){
 const store=detectStore(text);
 const lines=text.split('\n');
 let results=[];

 lines.forEach(l=>{
  if(/合計|小計|内税|釣銭|預り/.test(l)) return;

  const m=l.match(/(\d{1,6})\s?円?$/);
  if(!m) return;

  let name=l.replace(m[0],'').trim();

  if(store==='seven'){
    name=name.replace(/\*/g,'');
  }

  results.push({
    name:name||'商品',
    price:parseInt(m[1]),
    category:/※|＊|軽/.test(l)?'food':'other'
  });
 });

 return results;
}

// OCR
async function scan(){
 const files=document.getElementById('file').files;
 if(!files.length) return;

 items=[];

 for(const file of files){
  const canvas=await preprocess(file);

  const result=await Tesseract.recognize(canvas,'jpn+eng',{
    tessedit_pageseg_mode:6,
    logger:m=>{
      if(m.status==='recognizing'){
        document.getElementById('status').innerText = Math.round(m.progress*100)+'%';
      }
    }
  });

  items=items.concat(parse(result.data.text));
 }

 render();
}

// UI
function render(){
 const el=document.getElementById('items');
 el.innerHTML=items.map((i,idx)=>`
  <div class="item">
   <input value="${i.name}" onchange="items[${idx}].name=this.value">
   <input type="number" value="${i.price}" onchange="items[${idx}].price=+this.value">
   <span class="badge ${i.category}">${i.category==='food'?'🥦':'📦'}</span>
   <button onclick="toggle(${idx})">切替</button>
  </div>
 `).join('');
}

function toggle(i){
 items[i].category = items[i].category==='food'?'other':'food';
 render();
}

// 税
function calcTax(price, rate){
 return price - (price/(1+rate));
}

function calcTotals(data){
 let total=0,food=0,other=0;
 data.forEach(r=>{
  r.items.forEach(i=>{
    total+=i.price;
    if(i.category==='food') food+=i.price;
    else other+=i.price;
  });
 });

 const foodTax=calcTax(food,0.08);
 const otherTax=calcTax(other,0.10);

 return {total,food,other,tax:foodTax+otherTax,foodTax,otherTax};
}

function renderSummary(){
 if(!db) return;
 const tx=db.transaction('receipts','readonly');
 const store=tx.objectStore('receipts');

 store.getAll().onsuccess=e=>{
  let data=e.target.result;

  if(document.getElementById('period').value==='month'){
    const now=new Date();
    data=data.filter(r=>{
      const d=new Date(r.date);
      return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
    });
  }

  const t=calcTotals(data);

  document.getElementById('summary').innerHTML=`
   総額: ${Math.round(t.total)}円<br>
   税額: ${Math.round(t.tax)}円<br>
   食品: ${Math.round(t.food)}円 (税${Math.round(t.foodTax)})<br>
   その他: ${Math.round(t.other)}円 (税${Math.round(t.otherTax)})
  `;
 };
}

// 保存
function save(){
 const tx=db.transaction('receipts','readwrite');
 tx.objectStore('receipts').add({
  store:document.getElementById('store').value,
  date:document.getElementById('date').value,
  items
 });
 renderSummary();
 alert('保存完了');
}
</script>
</body>
</html>
