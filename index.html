<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Receipt AI Pro - High Precision</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 50px; }
        .container { max-width: 500px; margin: auto; padding: 16px; }
        
        /* カメラエリア */
        .preview-box { position: relative; width: 100%; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 10px; border: 2px solid #334155; }
        video { width: 100%; display: block; }
        .scan-line { position: absolute; width: 100%; height: 2px; background: var(--accent); top: 0; animation: scan 2s linear infinite; opacity: 0.5; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        /* ボタン */
        .controls { display: flex; gap: 8px; margin-bottom: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-start { background: var(--primary); color: white; }
        .btn-stop { background: #475569; color: white; }
        button:active { transform: scale(0.98); }

        /* リスト表示 */
        .card { background: var(--card); padding: 12px; border-radius: 12px; margin-top: 12px; border: 1px solid #334155; }
        .label { font-size: 12px; color: var(--accent); font-weight: bold; margin-bottom: 8px; display: block; }
        .item { padding: 10px; border-bottom: 1px solid #334155; cursor: pointer; font-size: 14px; }
        .item:last-child { border-bottom: none; }
        .item:hover { background: #334155; }
        
        /* ログ（デバッグ用） */
        #debug-log { font-size: 10px; color: #94a3b8; height: 40px; overflow-y: auto; background: #000; padding: 5px; border-radius: 4px; margin-top: 5px; }
        .small { font-size: 12px; color: #94a3b8; }
        .price { color: var(--accent); font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🧾 Receipt AI Pro</h1>

    <div class="preview-box">
        <video id="video" autoplay playsinline></video>
        <div class="scan-line"></div>
    </div>
    
    <div class="controls">
        <button id="btn-toggle" class="btn-start" onclick="toggleCamera()">📷 カメラ開始</button>
    </div>
