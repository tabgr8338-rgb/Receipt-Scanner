<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receipt AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
  :root {
    --bg:#f0f2f5;--card:#fff;--primary:#1a56db;--primary-light:#e8f0fe;
    --danger:#e53e3e;--warn:#d97706;--success:#16a34a;
    --text:#1a202c;--muted:#6b7280;--border:#e5e7eb;--radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .app{max-width:520px;margin:0 auto;padding:16px}

  /* Header */
  .header{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding:16px 0 12px}
  .header-icon{width:40px;height:40px;background:var(--primary);border-radius:10px;display:grid;place-items:center;color:#fff;font-size:20px;flex-shrink:0}
  .header h1{font-size:20px;font-weight:700}
  .header p{font-size:12px;color:var(--muted)}

  /* Tab Nav */
  .tab-nav{display:flex;gap:4px;background:#e5e7eb;border-radius:10px;padding:4px;margin-bottom:16px}
  .tab-btn{flex:1;padding:8px;border:none;background:transparent;border-radius:7px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s}
  .tab-btn.active{background:#fff;color:var(--primary);box-shadow:0 1px 4px rgba(0,0,0,.1)}

  /* Cards */
  .card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--border)}
  .card-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;gap:6px}

  /* Upload */
  .upload-area{border:2px dashed var(--border);border-radius:10px;padding:28px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
  .upload-area:hover{border-color:var(--primary);background:var(--primary-light)}
  .upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
  .upload-icon{font-size:32px;margin-bottom:8px}
  .upload-label{font-size:14px;font-weight:600;color:var(--primary)}
  .upload-sub{font-size:12px;color:var(--muted);margin-top:4px}
  .file-name{margin-top:8px;font-size:13px;font-weight:600}

  /* Progress */
  .progress-wrap{display:none;margin-top:12px}
  .progress-wrap.show{display:block}
  .progress-label{font-size:12px;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between}
  .progress-bar{height:6px;background:var(--border);border-radius:999px;overflow:hidden}
  .progress-fill{height:100%;background:var(--primary);border-radius:999px;transition:width .3s;width:0%}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;font-size:14px;font-weight:600;padding:10px 16px;border-radius:8px;cursor:pointer;border:none;transition:all .15s;width:100%;margin-top:10px}
  .btn-primary{background:var(--primary);color:#fff}
  .btn-primary:hover{background:#1648c0}
  .btn-primary:disabled{background:#9ca3af;cursor:not-allowed}
  .btn-success{background:var(--success);color:#fff}
  .btn-success:hover{background:#15803d}
  .btn-success:disabled{background:#9ca3af;cursor:not-allowed}
  .btn-outline{background:transparent;color:var(--primary);border:1.5px solid var(--primary)}
  .btn-outline:hover{background:var(--primary-light)}
  .btn-danger{background:var(--danger);color:#fff}
  .btn-danger:hover{background:#c53030}

  /* Store badge */
  .store-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px;background:#fff3cd;color:#92400e}

  /* Items */
  .item-row{display:grid;grid-template-columns:1fr 80px 36px;gap:6px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);animation:fadeIn .2s ease}
  .item-row:last-child{border-bottom:none}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
  .item-name-wrap{min-width:0}
  .item-name{width:100%;border:none;background:transparent;font-family:inherit;font-size:14px;color:var(--text);padding:2px 4px;border-radius:4px;outline:none;transition:background .15s}
  .item-name:focus{background:var(--primary-light)}
  .item-meta{font-size:11px;color:var(--muted);padding:0 4px}
  .item-price{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;border:none;background:transparent;text-align:right;color:var(--text);padding:2px 4px;border-radius:4px;outline:none;transition:background .15s;width:100%}
  .item-price:focus{background:var(--primary-light)}
  .category-btn{font-size:11px;font-weight:700;padding:3px 6px;border-radius:6px;border:none;cursor:pointer;transition:all .15s;white-space:nowrap}
  .cat-food{background:#dcfce7;color:#15803d}
  .cat-daily{background:#fef9c3;color:#854d0e}
  .cat-other{background:#e0e7ff;color:#3730a3}
  .warn-icon{color:var(--warn);font-size:12px}

  /* Summary */
  .summary-row{display:flex;justify-content:space-between;font-size:14px;padding:6px 0;border-bottom:1px solid var(--border)}
  .summary-row:last-child{border:none;font-weight:700;font-size:16px}
  .summary-val{font-family:'JetBrains Mono',monospace;font-weight:600}

  /* History */
  .history-item{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--border);transition:background .15s;border-radius:8px}
  .history-item:last-child{border-bottom:none}
  .history-item:hover{background:var(--bg)}
  .history-thumb{width:56px;height:56px;border-radius:8px;object-fit:cover;background:var(--bg);border:1px solid var(--border);flex-shrink:0;cursor:pointer}
  .history-thumb-placeholder{width:56px;height:56px;border-radius:8px;background:var(--bg);border:1px solid var(--border);display:grid;place-items:center;font-size:22px;flex-shrink:0}
  .history-info{flex:1;min-width:0;cursor:pointer}
  .history-store{font-size:13px;font-weight:700;margin-bottom:2px}
  .history-date{font-size:11px;color:var(--muted);margin-bottom:4px}
  .history-total{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--primary)}
  .history-cats{font-size:11px;color:var(--muted);margin-top:2px}
  .history-del{background:none;border:none;color:#ccc;cursor:pointer;font-size:18px;padding:4px;border-radius:6px;transition:color .15s;align-self:center;flex-shrink:0}
  .history-del:hover{color:var(--danger)}

  /* Filter bar */
  .filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
  .filter-chip{padding:5px 12px;border-radius:999px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;transition:all .15s;font-family:inherit}
  .filter-chip.active{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
  .filter-select{padding:5px 10px;border-radius:999px;font-size:12px;border:1.5px solid var(--border);background:#fff;color:var(--text);font-family:inherit;cursor:pointer;outline:none}

  /* Detail Modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center}
  .modal-overlay.show{display:flex}
  .modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;padding:20px}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .modal-title{font-size:16px;font-weight:700}
  .modal-close{background:var(--bg);border:none;border-radius:999px;width:32px;height:32px;cursor:pointer;font-size:16px}
  .modal-img{width:100%;border-radius:10px;margin-bottom:16px;display:none}
  .modal-img.show{display:block}

  /* Toast */
  .toast-wrap{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
  .toast{padding:10px 18px;border-radius:999px;font-size:14px;font-weight:600;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.2);animation:toastIn .25s ease,toastOut .3s ease 2.5s forwards;pointer-events:auto;white-space:nowrap}
  .toast-success{background:var(--success)}
  .toast-error{background:var(--danger)}
  .toast-warn{background:var(--warn)}
  @keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes toastOut{to{opacity:0;transform:translateY(10px)}}

  .empty{text-align:center;padding:28px 0;color:var(--muted);font-size:14px}
  .empty span{font-size:32px;display:block;margin-bottom:8px}

  /* Settings */
  .setting-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
  .setting-row:last-child{border-bottom:none}
  .setting-label{font-size:14px;font-weight:600}
  .setting-sub{font-size:11px;color:var(--muted);margin-top:2px}
  .setting-input{width:80px;padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:14px;text-align:right;outline:none}
  .setting-input:focus{border-color:var(--primary)}
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-icon">🧾</div>
    <div><h1>Receipt AI</h1><p>レシートをスキャンして自動仕訳</p></div>
  </div>

  <!-- Tab Nav -->
  <div class="tab-nav">
    <button class="tab-btn active" id="tabScan"    onclick="switchTab('scan')">📷 スキャン</button>
    <button class="tab-btn"        id="tabHistory" onclick="switchTab('history')">📋 履歴</button>
    <button class="tab-btn"        id="tabSettings"onclick="switchTab('settings')">⚙ 設定</button>
  </div>

  <!-- ===== SCAN TAB ===== -->
  <div id="scanTab">
    <div class="card">
      <div class="card-title">📷 スキャン</div>
      <div class="upload-area">
        <input type="file" id="file" accept="image/*" onchange="onFileSelect(this)">
        <div class="upload-icon">📄</div>
        <div class="upload-label">画像を選択 / カメラで撮影</div>
        <div class="upload-sub">JPEG・PNG・HEIC対応</div>
        <div class="file-name" id="fileName"></div>
      </div>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-label">
          <span id="progressLabel">準備中...</span>
          <span id="progressPct">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </div>
      <button class="btn btn-primary" id="scanBtn" onclick="scan(this)" disabled>🔍 スキャン開始</button>
    </div>

    <div class="card" id="itemsCard" style="display:none">
      <div class="card-title">📋 明細 <span id="storeBadge"></span></div>
      <div id="items"></div>
      <div id="summaryArea" style="margin-top:12px"></div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn btn-outline" style="width:50%" onclick="confirmData()">確認</button>
        <button class="btn btn-success" style="width:50%" id="saveBtn" onclick="save(this)">💾 保存</button>
      </div>
    </div>
  </div>

  <!-- ===== HISTORY TAB ===== -->
  <div id="historyTab" style="display:none">
    <div class="card">
      <div class="card-title">📋 保存済みレシート</div>
      <div class="filter-bar">
        <button class="filter-chip active" onclick="setFilter('all',this)">すべて</button>
        <button class="filter-chip" onclick="setFilter('food',this)">🥦 食品</button>
        <button class="filter-chip" onclick="setFilter('daily',this)">🧴 日用品</button>
        <button class="filter-chip" onclick="setFilter('other',this)">📦 その他</button>
        <select class="filter-select" id="periodSelect" onchange="loadHistory()">
          <option value="all">全期間</option>
          <option value="today">今日</option>
          <option value="week" selected>今週</option>
          <option value="month">今月</option>
          <option value="3months">3ヶ月</option>
          <option value="year">今年</option>
        </select>
      </div>
      <!-- 合計サマリー -->
      <div id="historySummary" style="margin-bottom:12px;padding:10px;background:var(--primary-light);border-radius:8px;display:none">
        <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:4px">
          <span>期間合計（税込）</span><span id="histTotalInc" style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--primary)">¥0</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted)">
          <span>うち消費税</span><span id="histTotalTax" style="font-family:'JetBrains Mono',monospace">¥0</span>
        </div>
      </div>
      <div id="historyList"></div>
    </div>
  </div>

  <!-- ===== SETTINGS TAB ===== -->
  <div id="settingsTab" style="display:none">
    <div class="card">
      <div class="card-title">⚙ 税率設定</div>
      <div class="setting-row">
        <div><div class="setting-label">食品（軽減税率）</div><div class="setting-sub">※・軽 マーク商品</div></div>
        <div style="display:flex;align-items:center;gap:4px">
          <input type="number" id="taxFood" class="setting-input" value="8" min="0" max="100" step="0.1">
          <span style="font-size:13px">%</span>
        </div>
      </div>
      <div class="setting-row">
        <div><div class="setting-label">日用品・その他（標準税率）</div><div class="setting-sub">通常の商品・サービス</div></div>
        <div style="display:flex;align-items:center;gap:4px">
          <input type="number" id="taxOther" class="setting-input" value="10" min="0" max="100" step="0.1">
          <span style="font-size:13px">%</span>
        </div>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:8px;line-height:1.6">
        ※ 税率変更は今後の登録にのみ適用されます。過去データは登録時の税率を保持します。
      </div>
      <button class="btn btn-primary" onclick="saveSettings()">✓ 保存</button>
    </div>

    <div class="card">
      <div class="card-title">🗄 データ管理</div>
      <div class="setting-row">
        <div><div class="setting-label">データ保存期間</div><div class="setting-sub">超過データを自動削除</div></div>
        <div style="display:flex;align-items:center;gap:4px">
          <input type="number" id="retentionDays" class="setting-input" value="365" min="30" max="3650">
          <span style="font-size:13px">日</span>
        </div>
      </div>
      <button class="btn btn-outline" style="margin-top:12px" onclick="exportData()">📤 JSONエクスポート</button>
      <button class="btn btn-danger"  style="margin-top:8px"  onclick="clearAllData()">🗑 全データ削除</button>
    </div>
  </div>

</div><!-- /.app -->

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <img class="modal-img" id="modalImg" alt="レシート画像">
    <div id="modalItems"></div>
    <div id="modalSummary" style="margin-top:12px"></div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
// =========================================
// IndexedDB
// =========================================
const DB_NAME = 'receiptAI', DB_VER = 1;
let db;

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('receipts')) {
        const s = d.createObjectStore('receipts', { keyPath: 'id', autoIncrement: true });
        s.createIndex('date', 'date');
      }
      if (!d.objectStoreNames.contains('dictionary')) {
        d.createObjectStore('dictionary', { keyPath: 'raw' });
      }
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror   = e => rej(e.target.error);
  });
}

function dbAdd(store, data) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).add(data);
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
}

function dbGetAll(store) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
}

function dbDelete(store, id) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(id);
    req.onsuccess = () => res();
    req.onerror   = e => rej(e.target.error);
  });
}

function dbClear(store) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).clear();
    req.onsuccess = () => res();
    req.onerror   = e => rej(e.target.error);
  });
}

function dbPut(store, data) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(data);
    req.onsuccess = () => res();
    req.onerror   = e => rej(e.target.error);
  });
}

// =========================================
// Settings
// =========================================
let settings = { taxFood: 8, taxOther: 10, retentionDays: 365 };

function loadSettings() {
  const s = localStorage.getItem('receiptAI_settings');
  if (s) settings = { ...settings, ...JSON.parse(s) };
  document.getElementById('taxFood').value        = settings.taxFood;
  document.getElementById('taxOther').value       = settings.taxOther;
  document.getElementById('retentionDays').value  = settings.retentionDays;
}

function saveSettings() {
  settings.taxFood       = parseFloat(document.getElementById('taxFood').value)       || 8;
  settings.taxOther      = parseFloat(document.getElementById('taxOther').value)      || 10;
  settings.retentionDays = parseInt(document.getElementById('retentionDays').value)   || 365;
  localStorage.setItem('receiptAI_settings', JSON.stringify(settings));
  toast('設定を保存しました', 'success');
}

// =========================================
// Toast
// =========================================
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toastWrap').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// =========================================
// Tab
// =========================================
function switchTab(tab) {
  ['scan','history','settings'].forEach(t => {
    document.getElementById(t + 'Tab').style.display = t === tab ? 'block' : 'none';
    document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.toggle('active', t === tab);
  });
  if (tab === 'history') loadHistory();
}

// =========================================
// Image processing
// =========================================
let currentFile = null;

function onFileSelect(input) {
  const f = input.files[0]; if (!f) return;
  currentFile = f;
  document.getElementById('fileName').textContent = '📎 ' + f.name;
  document.getElementById('scanBtn').disabled = false;
}

function preprocessForOCR(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('ファイル読み込み失敗'));
    reader.onload = e => {
      const img = new Image();
      img.onerror = () => reject(new Error('画像解析失敗'));
      img.onload = () => {
        try {
          const W = 1200, scale = W / img.width;
          const canvas = document.createElement('canvas');
          canvas.width = W; canvas.height = Math.round(img.height * scale);
          const ctx = canvas.getContext('2d');
          ctx.filter = 'contrast(1.4) brightness(1.1)';
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          const id = ctx.getImageData(0, 0, canvas.width, canvas.height), d = id.data;
          const hist = new Array(256).fill(0);
          for (let i = 0; i < d.length; i += 4)
            hist[Math.round(0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2])]++;
          const total = canvas.width * canvas.height;
          let sum = 0; for (let i = 0; i < 256; i++) sum += i * hist[i];
          let sumB = 0, wB = 0, maxVar = 0, thresh = 128;
          for (let t = 0; t < 256; t++) {
            wB += hist[t]; if (!wB || wB === total) continue;
            const wF = total - wB; sumB += t * hist[t];
            const v = wB * wF * ((sumB/wB) - ((sum-sumB)/wF)) ** 2;
            if (v > maxVar) { maxVar = v; thresh = t; }
          }
          for (let i = 0; i < d.length; i += 4) {
            const g = Math.round(0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2]);
            d[i] = d[i+1] = d[i+2] = g > thresh ? 255 : 0;
          }
          ctx.putImageData(id, 0, 0);
          resolve(canvas.toDataURL('image/jpeg', 0.9));
        } catch(err) { reject(err); }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function makeThumbnail(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onerror = () => resolve(null);
    reader.onload = e => {
      const img = new Image();
      img.onerror = () => resolve(null);
      img.onload = () => {
        try {
          const W = 400, scale = W / img.width;
          const canvas = document.createElement('canvas');
          canvas.width = W; canvas.height = Math.round(img.height * scale);
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL('image/jpeg', 0.6));
        } catch { resolve(null); }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// =========================================
// Store / Category detection
// =========================================
function detectStore(t) {
  if (/セブン|7[-‐]ELEVEN/i.test(t))         return 'seven';
  if (/イオン|AEON/i.test(t))                return 'aeon';
  if (/ファミリーマート|FamilyMart/i.test(t)) return 'familymart';
  if (/ローソン|LAWSON/i.test(t))             return 'lawson';
  return 'generic';
}
const STORE_LABELS = {
  seven:'🏪 セブン-イレブン', aeon:'🏬 イオン',
  familymart:'🏪 ファミリーマート', lawson:'🏪 ローソン', generic:'🧾 汎用'
};
function detectCategory(l) {
  if (/[※＊]\s*軽|軽減|食品|飲料|弁当|おにぎり|サンド|パン|菓子|ジュース|水|茶/.test(l)) return 'food';
  if (/[※＊]/.test(l)) return 'food';
  if (/日用品|洗剤|シャンプー|電池|文具|雑貨/.test(l)) return 'daily';
  return 'other';
}

// =========================================
// Parsers
// =========================================
function buildItem(raw, name, unitPrice, qty = 1, confidence = 0.8) {
  return { originalName: raw, name, unitPrice, qty, subtotal: unitPrice * qty, category: detectCategory(raw), confidence };
}
function parseSeven(lines) {
  return lines.map(l => {
    const m = l.match(/^(.+?)\s+[¥￥]([\d,]+)/);
    if (!m) return null;
    const p = parseInt(m[2].replace(/,/g,''), 10);
    return (p > 0 && p <= 100000) ? buildItem(l, m[1].trim(), p) : null;
  }).filter(Boolean);
}
function parseAeon(lines) {
  return lines.map(l => {
    const m = l.match(/^(.+?)\s{2,}([\d,]+)\s*$/);
    if (!m) return null;
    const p = parseInt(m[2].replace(/,/g,''), 10);
    return (p > 0 && p <= 100000) ? buildItem(l, m[1].trim(), p) : null;
  }).filter(Boolean);
}
function parseGeneric(lines) {
  return lines.map(l => {
    if (/^(合計|小計|税|おつり|預り|消費税|内税|外税|ありがとう|Tel|TEL|〒|領収)/i.test(l.trim())) return null;
    let m = l.match(/^(.+?)\s+(\d+)\s*[×xX]\s*([\d,]+)/);
    if (m) {
      const qty = parseInt(m[2],10), unit = parseInt(m[3].replace(/,/g,''),10);
      if (!isNaN(qty) && !isNaN(unit)) return buildItem(l, m[1].trim(), unit, qty);
    }
    m = l.match(/^(.+?)\s+[¥￥]([\d,]+)/);
    if (m) { const p = parseInt(m[2].replace(/,/g,''),10); if (p>0&&p<=100000) return buildItem(l,m[1].trim(),p); }
    m = l.match(/^(.+?)\s+([\d,]+)\s*円/);
    if (m) { const p = parseInt(m[2].replace(/,/g,''),10); if (p>0&&p<=100000) return buildItem(l,m[1].trim(),p); }
    m = l.match(/^(.{2,}?)\s+([\d,]{2,})\s*$/);
    if (m) { const p = parseInt(m[2].replace(/,/g,''),10); if (p>0&&p<=100000) return buildItem(l,m[1].trim(),p,1,0.55); }
    return null;
  }).filter(Boolean);
}
function parseByStore(store, text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 1);
  const parsers = { seven: parseSeven, aeon: parseAeon };
  const result = (parsers[store] || parseGeneric)(lines);
  return result.length > 0 ? result : parseGeneric(lines);
}

// =========================================
// Dictionary (Levenshtein)
// =========================================
let dictionary = [];

async function loadDict() {
  dictionary = await dbGetAll('dictionary');
}

function levenshtein(a, b) {
  let prev = Array.from({ length: b.length + 1 }, (_, i) => i);
  for (let i = 1; i <= a.length; i++) {
    const curr = [i];
    for (let j = 1; j <= b.length; j++)
      curr[j] = Math.min(curr[j-1]+1, prev[j]+1, prev[j-1]+(a[i-1]===b[j-1]?0:1));
    prev = curr;
  }
  return prev[b.length];
}
function similarity(a, b) {
  if (a === b) return 1;
  const max = Math.max(a.length, b.length);
  return max ? 1 - levenshtein(a, b) / max : 1;
}
function normalizeName(name) {
  const candidates = dictionary.filter(d => d.raw && d.raw[0] === name[0]);
  let best = name, bestScore = 0;
  for (const d of candidates) {
    const s = similarity(name, d.raw);
    if (s > bestScore && s > 0.75) { bestScore = s; best = d.normalized; }
  }
  return best;
}
async function learnDict(items) {
  for (const i of items) {
    if (i.originalName && i.originalName !== i.name) {
      await dbPut('dictionary', { raw: i.originalName, normalized: i.name, count: 1 });
    }
  }
}

// =========================================
// XSS
// =========================================
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// =========================================
// Progress
// =========================================
function setProgress(label, pct) {
  document.getElementById('progressWrap').classList.add('show');
  document.getElementById('progressLabel').textContent = label;
  document.getElementById('progressPct').textContent   = pct + '%';
  document.getElementById('progressFill').style.width  = pct + '%';
}
function hideProgress() { document.getElementById('progressWrap').classList.remove('show'); }

// =========================================
// Scan
// =========================================
let items = [], currentStore = 'generic';

async function scan(btn) {
  const file = document.getElementById('file').files[0];
  if (!file) { toast('ファイルを選択してください', 'warn'); return; }
  btn.disabled = true;
  try {
    setProgress('画像を前処理中...', 15);
    const img = await preprocessForOCR(file).catch(e => { throw new Error('前処理失敗: ' + e.message); });

    setProgress('OCR実行中...', 35);
    const ocr = await Tesseract.recognize(img, 'jpn+eng', {
      logger: m => { if (m.status === 'recognizing text') setProgress('テキスト認識中...', Math.round(35 + m.progress * 45)); }
    }).catch(() => { throw new Error('OCR失敗。鮮明な画像を使用してください'); });

    const text = ocr?.data?.text || '';
    if (text.trim().length < 5) throw new Error('テキストを認識できませんでした');

    setProgress('明細を解析中...', 85);
    currentStore = detectStore(text);
    const parsed = parseByStore(currentStore, text);
    if (!parsed.length) toast('明細が検出できませんでした', 'warn');

    setProgress('辞書照合中...', 95);
    items = parsed.map(i => ({ ...i, name: normalizeName(i.name) }));

    document.getElementById('storeBadge').innerHTML =
      `<span class="store-badge">${STORE_LABELS[currentStore] || '🧾 汎用'}</span>`;
    setProgress('完了', 100);
    render();
    document.getElementById('itemsCard').style.display = 'block';
    toast(`${items.length}件の明細を検出しました`, 'success');
  } catch (err) {
    toast('❌ ' + err.message, 'error');
  } finally {
    hideProgress();
    btn.disabled = false;
  }
}

// =========================================
// Render items
// =========================================
function render() {
  const el = document.getElementById('items');
  if (!items.length) {
    el.innerHTML = '<div class="empty"><span>📭</span>明細なし</div>';
    document.getElementById('summaryArea').innerHTML = '';
    return;
  }
  el.innerHTML = items.map((item, idx) => `
    <div class="item-row">
      <div class="item-name-wrap">
        <input class="item-name" value="${escHtml(item.name)}" onchange="updateItem(${idx},'name',this.value)">
        <div class="item-meta">数量: ${item.qty} ${item.confidence < 0.6 ? '<span class="warn-icon">⚠</span>' : ''}</div>
      </div>
      <input class="item-price" type="number" min="0" value="${item.unitPrice}" onchange="updateItem(${idx},'unitPrice',+this.value)">
      <button class="category-btn cat-${item.category}" onclick="toggleCategory(${idx})">
        ${item.category==='food'?'食品':item.category==='daily'?'日用':'他'}
      </button>
    </div>`).join('');
  renderSummary();
}

function renderSummary() {
  const tf = settings.taxFood / 100, to = settings.taxOther / 100;
  const sumPre = c => items.filter(i => i.category === c).reduce((s, i) => s + i.subtotal, 0);
  const f = sumPre('food'), d = sumPre('daily'), o = sumPre('other');
  const fInc = f * (1 + tf), dInc = d * (1 + to), oInc = o * (1 + to);
  const tInc = fInc + dInc + oInc;
  const tax  = f * tf + d * to + o * to;
  document.getElementById('summaryArea').innerHTML = `
    <div class="summary-row"><span>🥦 食品（税込 ${settings.taxFood}%）</span><span class="summary-val">¥${Math.round(fInc).toLocaleString()}</span></div>
    <div class="summary-row"><span>🧴 日用品（税込 ${settings.taxOther}%）</span><span class="summary-val">¥${Math.round(dInc).toLocaleString()}</span></div>
    <div class="summary-row"><span>📦 その他（税込 ${settings.taxOther}%）</span><span class="summary-val">¥${Math.round(oInc).toLocaleString()}</span></div>
    <div class="summary-row"><span>消費税合計</span><span class="summary-val">¥${Math.round(tax).toLocaleString()}</span></div>
    <div class="summary-row"><span>合計（税込）</span><span class="summary-val">¥${Math.round(tInc).toLocaleString()}</span></div>`;
}

function updateItem(idx, key, val) {
  items[idx][key] = val;
  if (key === 'unitPrice') items[idx].subtotal = items[idx].unitPrice * items[idx].qty;
  renderSummary();
}
function toggleCategory(idx) {
  const cats = ['food','daily','other'];
  items[idx].category = cats[(cats.indexOf(items[idx].category) + 1) % cats.length];
  render();
}
function confirmData() {
  const low = items.filter(i => i.confidence < 0.6).length;
  low > 0 ? toast(`⚠ 信頼度の低い項目が${low}件`, 'warn') : toast('✅ 内容に問題なし', 'success');
}

// =========================================
// Save to IndexedDB
// =========================================
async function save(btn) {
  if (!items.length) { toast('保存する明細がありません', 'warn'); return; }
  btn.disabled = true;
  try {
    await learnDict(items);
    const thumb = currentFile ? await makeThumbnail(currentFile) : null;
    const tf = settings.taxFood / 100, to = settings.taxOther / 100;
    const taxedItems = items.map(i => ({
      ...i,
      taxRate: i.category === 'food' ? settings.taxFood : settings.taxOther,
      taxedSubtotal: i.subtotal * (1 + (i.category === 'food' ? tf : to))
    }));
    await dbAdd('receipts', {
      store: document.getElementById('storeBadge').textContent.trim(),
      date: new Date().toISOString(),
      items: taxedItems,
      thumb,
      taxSnapshot: { food: settings.taxFood, other: settings.taxOther },
      createdAt: Date.now()
    });
    await loadDict();
    toast('✅ 保存しました', 'success');
    // リセット
    items = []; currentFile = null;
    document.getElementById('file').value = '';
    document.getElementById('fileName').textContent = '';
    document.getElementById('scanBtn').disabled = true;
    document.getElementById('itemsCard').style.display = 'none';
    await cleanOldData();
  } catch (err) {
    toast('❌ ' + err.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

async function cleanOldData() {
  const all = await dbGetAll('receipts');
  const cutoff = Date.now() - settings.retentionDays * 86400000;
  for (const r of all) {
    if (r.createdAt < cutoff) await dbDelete('receipts', r.id);
  }
}

// =========================================
// History
// =========================================
let currentFilter = 'all';

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  loadHistory();
}

function getPeriodRange(period) {
  const now = new Date(), today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if (period === 'today')   return [today, now];
  if (period === 'week')    { const d = new Date(today); d.setDate(d.getDate()-6); return [d, now]; }
  if (period === 'month')   { const d = new Date(today); d.setDate(1); return [d, now]; }
  if (period === '3months') { const d = new Date(today); d.setMonth(d.getMonth()-3); return [d, now]; }
  if (period === 'year')    return [new Date(now.getFullYear(), 0, 1), now];
  return [null, null];
}

async function loadHistory() {
  const el = document.getElementById('historyList');
  el.innerHTML = '<div class="empty"><span>⏳</span>読み込み中...</div>';
  try {
    let data = await dbGetAll('receipts');
    // 期間フィルター
    const period = document.getElementById('periodSelect').value;
    const [start, end] = getPeriodRange(period);
    if (start) data = data.filter(r => { const d = new Date(r.date); return d >= start && d <= end; });
    // カテゴリフィルター
    if (currentFilter !== 'all') {
      data = data.filter(r => r.items.some(i => i.category === currentFilter));
    }
    data.sort((a, b) => new Date(b.date) - new Date(a.date));

    // サマリー計算
    let totalInc = 0, totalTax = 0;
    data.forEach(r => {
      r.items.forEach(i => {
        if (currentFilter === 'all' || i.category === currentFilter) {
          totalInc += i.taxedSubtotal || 0;
          const rate = (i.taxRate || 10) / 100;
          totalTax += (i.taxedSubtotal || 0) / (1 + rate) * rate;
        }
      });
    });
    const sumEl = document.getElementById('historySummary');
    if (data.length) {
      sumEl.style.display = 'block';
      document.getElementById('histTotalInc').textContent = '¥' + Math.round(totalInc).toLocaleString();
      document.getElementById('histTotalTax').textContent = '¥' + Math.round(totalTax).toLocaleString();
    } else {
      sumEl.style.display = 'none';
    }

    if (!data.length) {
      el.innerHTML = '<div class="empty"><span>📭</span>保存済みレシートなし</div>';
      return;
    }

    el.innerHTML = data.map(r => {
      const dispItems = currentFilter === 'all' ? r.items : r.items.filter(i => i.category === currentFilter);
      const total = dispItems.reduce((s, i) => s + (i.taxedSubtotal || 0), 0);
      const date  = new Date(r.date).toLocaleDateString('ja-JP', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
      const thumb = r.thumb
        ? `<img class="history-thumb" src="${r.thumb}" onclick='openModal(${r.id})' alt="レシート">`
        : `<div class="history-thumb-placeholder">🧾</div>`;
      const cats = dispItems.reduce((acc, i) => {
        acc[i.category] = (acc[i.category] || 0) + (i.taxedSubtotal || 0); return acc;
      }, {});
      const catStr = [
        cats.food  ? `食品 ¥${Math.round(cats.food).toLocaleString()}`  : '',
        cats.daily ? `日用 ¥${Math.round(cats.daily).toLocaleString()}` : '',
        cats.other ? `他   ¥${Math.round(cats.other).toLocaleString()}` : '',
      ].filter(Boolean).join(' / ');
      return `
        <div class="history-item">
          ${thumb}
          <div class="history-info" onclick="openModal(${r.id})">
            <div class="history-store">${escHtml(r.store || '汎用')}</div>
            <div class="history-date">${date}</div>
            <div class="history-total">¥${Math.round(total).toLocaleString()}</div>
            <div class="history-cats">${escHtml(catStr)}</div>
          </div>
          <button class="history-del" onclick="deleteReceipt(${r.id})" title="削除">🗑</button>
        </div>`;
    }).join('');
  } catch (err) {
    el.innerHTML = '<div class="empty"><span>❌</span>読み込み失敗</div>';
    toast('履歴の取得に失敗しました', 'error');
  }
}

async function deleteReceipt(id) {
  if (!confirm('このレシートを削除しますか？')) return;
  await dbDelete('receipts', id);
  toast('削除しました', 'warn');
  loadHistory();
}

// =========================================
// Modal
// =========================================
async function openModal(id) {
  const all = await dbGetAll('receipts');
  const r = all.find(x => x.id === id);
  if (!r) return;
  document.getElementById('modalTitle').textContent = r.store || '汎用';
  const imgEl = document.getElementById('modalImg');
  if (r.thumb) { imgEl.src = r.thumb; imgEl.classList.add('show'); }
  else          { imgEl.classList.remove('show'); }

  const its = r.items || [];
  document.getElementById('modalItems').innerHTML = its.map(i => `
    <div class="item-row" style="pointer-events:none">
      <div class="item-name-wrap">
        <div class="item-name" style="padding:2px 4px">${escHtml(i.name)}</div>
        <div class="item-meta">数量: ${i.qty}　税率: ${i.taxRate || 10}%</div>
      </div>
      <div class="item-price">¥${Math.round(i.taxedSubtotal || 0).toLocaleString()}</div>
      <span class="category-btn cat-${i.category}">
        ${i.category==='food'?'食品':i.category==='daily'?'日用':'他'}
      </span>
    </div>`).join('');

  const sum = c => its.filter(i=>i.category===c).reduce((s,i)=>s+(i.taxedSubtotal||0),0);
  const f=sum('food'),d=sum('daily'),o=sum('other'),t=f+d+o;
  const tf=(r.taxSnapshot?.food||10)/100, to=(r.taxSnapshot?.other||10)/100;
  const tax = its.reduce((s,i)=>{
    const rate=(i.taxRate||10)/100;
    return s+(i.taxedSubtotal||0)/(1+rate)*rate;
  },0);
  document.getElementById('modalSummary').innerHTML = `
    <div class="summary-row"><span>🥦 食品</span><span class="summary-val">¥${Math.round(f).toLocaleString()}</span></div>
    <div class="summary-row"><span>🧴 日用品</span><span class="summary-val">¥${Math.round(d).toLocaleString()}</span></div>
    <div class="summary-row"><span>📦 その他</span><span class="summary-val">¥${Math.round(o).toLocaleString()}</span></div>
    <div class="summary-row"><span>消費税</span><span class="summary-val">¥${Math.round(tax).toLocaleString()}</span></div>
    <div class="summary-row"><span>合計（税込）</span><span class="summary-val">¥${Math.round(t).toLocaleString()}</span></div>`;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal(e) { if (e.target === document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modalOverlay').classList.remove('show'); }

// =========================================
// Data export / clear
// =========================================
async function exportData() {
  const data = await dbGetAll('receipts');
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'receipts_' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(url);
}

async function clearAllData() {
  const input = prompt('全データを削除します。確認のため「DELETE」と入力してください。');
  if (input !== 'DELETE') { toast('キャンセルしました', 'warn'); return; }
  await dbClear('receipts');
  await dbClear('dictionary');
  toast('全データを削除しました', 'warn');
  loadHistory();
}

// =========================================
// Init
// =========================================
(async () => {
  await openDB();
  loadSettings();
  await loadDict();
  await cleanOldData();
})();
